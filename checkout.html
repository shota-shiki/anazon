<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文確認 — Anazon</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
</head>
<body>

<div id="header-mount"></div>

<div class="page-wrap">

  <!-- ステップ表示 -->
  <div class="steps mb15">
    <div class="step done"><span class="sn">✓</span> カゴ</div>
    <span class="step-sep">›</span>
    <div class="step active"><span class="sn">2</span> 配送先入力</div>
    <span class="step-sep">›</span>
    <div class="step"><span class="sn">3</span> 注文完了</div>
  </div>

  <!-- ====================================================
       フォーム + サイドバー
       ==================================================== -->
  <div class="checkout-wrap">

    <!-- メインフォーム -->
    <div class="checkout-main">
      <div class="form-card">
        <h2>📝 配送先・注文者情報を入力してください</h2>

        <div id="alert-area"></div>

        <form id="checkout-form" onsubmit="submitOrder(event)">

          <div class="form-section">
            <h3>👤 お名前</h3>
            <div class="fg">
              <label>お名前<span class="req">*必須</span></label>
              <input type="text" id="f-name" name="customer_name" placeholder="例: 山田 太郎" required>
            </div>
            <div class="fg">
              <label>フリガナ</label>
              <input type="text" id="f-kana" name="customer_kana" placeholder="例: ヤマダ タロウ">
            </div>
          </div>

          <div class="form-section">
            <h3>🏠 配送先住所</h3>
            <div class="fg">
              <label>郵便番号<span class="req">*必須</span></label>
              <input type="text" id="f-zip" name="zip_code" placeholder="例: 123-4567" required
                     pattern="[0-9]{3}-?[0-9]{4}" maxlength="8">
              <p class="hint">ハイフンあり・なし両方OK</p>
            </div>
            <div class="fg">
              <label>都道府県<span class="req">*必須</span></label>
              <select id="f-pref" name="pref" required>
                <option value="">選択してください</option>
                <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option>
                <option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option>
                <option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option>
                <option>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option>
                <option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
                <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
                <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option>
                <option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option>
                <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
                <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
                <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option>
                <option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option>
              </select>
            </div>
            <div class="fg">
              <label>市区町村<span class="req">*必須</span></label>
              <input type="text" id="f-city" name="city" placeholder="例: 渋谷区" required>
            </div>
            <div class="fg">
              <label>番地・建物名<span class="req">*必須</span></label>
              <input type="text" id="f-addr" name="address" placeholder="例: 1-2-3 マンション101" required>
            </div>
          </div>

          <div class="form-section">
            <h3>📞 連絡先</h3>
            <div class="fg">
              <label>電話番号</label>
              <input type="tel" id="f-phone" name="phone" placeholder="例: 090-1234-5678">
            </div>
          </div>

          <div class="form-section">
            <h3>💌 相手へのメッセージ（任意）</h3>
            <div class="fg">
              <textarea id="f-msg" name="message" placeholder="メッセージをどうぞ…（例：おめでとう！長生きしろよ！）"></textarea>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btn-submit">
            注文を確定する →
          </button>
        </form>
      </div>
    </div>

    <!-- サイドバー -->
    <div class="checkout-side">
      <!-- 注文サマリー -->
      <div class="order-summary-card" id="order-summary">
        <h3>🧾 注文内容</h3>
        <div id="os-items"></div>
        <div class="os-total">
          <span>合計</span>
          <strong id="os-total-price"></strong>
        </div>
      </div>
    </div>
  </div>

  <!-- ====================================================
       📸 思い出広告: 横スクロール
       ==================================================== -->
  <div class="mem-scroll">
    <div class="mem-scroll-hd">
      <span class="tag">スポンサー</span>
    </div>
    <div class="mem-scroll-track">
      <div class="ms-item">
        <div class="frame" id="ms7">
          <img src="images/memories/photo7.JPEG" alt="思い出⑦"
               onerror="document.getElementById('ms7').classList.add('noph')">
          <div class="ph"><span>📸</span><strong>思い出⑦</strong><small>photo7.JPEG</small></div>
        </div>
        <p>小林駿太</p>
      </div>
      <div class="ms-item">
        <div class="frame" id="ms8">
          <img src="images/memories/photo8.JPEG" alt="思い出⑧"
               onerror="document.getElementById('ms8').classList.add('noph')">
          <div class="ph"><span>📸</span><strong>思い出⑧</strong><small>photo8.JPEG</small></div>
        </div>
        <p>田中潮</p>
      </div>
      <div class="ms-item">
        <div class="frame" id="ms9">
          <img src="images/memories/photo9.JPG" alt="思い出⑨"
               onerror="document.getElementById('ms9').classList.add('noph')">
          <div class="ph"><span>📸</span><strong>思い出⑨</strong><small>photo9.JPG</small></div>
        </div>
        <p>橋本</p>
      </div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<div id="footer-mount"></div>

<script>
document.getElementById('header-mount').innerHTML = buildHeader('checkout');
document.getElementById('footer-mount').innerHTML = buildFooter();

// EmailJS 初期化
emailjs.init({ publicKey: CONFIG.emailjs.publicKey });

// ---- カート確認 ----
const cartItem = Cart.get();

if (!cartItem) {
  document.querySelector('.page-wrap').innerHTML = `
    <div style="text-align:center;padding:60px;background:#fff;border-radius:4px;margin-top:20px">
      <p style="font-size:60px">🛒</p>
      <h2>カゴが空です</h2>
      <p style="margin:15px 0;color:#565959">先に商品をカゴに入れてください。</p>
      <a href="index.html" style="color:var(--link)">トップページへ戻る</a>
    </div>`;
} else {
  // 注文サマリー描画
  const osItems = document.getElementById('os-items');
  if (osItems) {
    osItems.innerHTML = `
      <div class="os-item">
        <img src="${cartItem.img}" alt="${cartItem.name}">
        <div class="os-item-info">
          <p class="os-item-name">${cartItem.name}</p>
          <p class="os-item-price">¥${cartItem.price.toLocaleString()}</p>
          <p style="font-size:12px;color:#565959">数量: 1</p>
        </div>
      </div>`;
    document.getElementById('os-total-price').textContent = '¥' + cartItem.price.toLocaleString();
  }
}

// ---- 注文送信 ----
async function submitOrder(e) {
  e.preventDefault();
  if (!cartItem) return;

  const btn = document.getElementById('btn-submit');
  const alertArea = document.getElementById('alert-area');
  alertArea.innerHTML = '';

  // バリデーション
  const name  = document.getElementById('f-name').value.trim();
  const zip   = document.getElementById('f-zip').value.trim();
  const pref  = document.getElementById('f-pref').value;
  const city  = document.getElementById('f-city').value.trim();
  const addr  = document.getElementById('f-addr').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();

  if (!name || !zip || !pref || !city || !addr) {
    alertArea.innerHTML = '<div class="alert-err">⚠️ 必須項目をすべて入力してください。</div>';
    alertArea.scrollIntoView({ behavior: 'smooth' });
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⏳</span> 送信中…';

  // 注文データを保存
  const orderData = {
    name, zip, pref, city, addr, phone, msg,
    product: cartItem,
    orderId: 'KZ-' + Date.now().toString().slice(-8),
    orderedAt: new Date().toLocaleString('ja-JP'),
  };
  Order.set(orderData);

  // EmailJS 送信
  try {
    await emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.templateId, {
      customer_name: name,
      product_name:  cartItem.name,
      product_price: '¥' + cartItem.price.toLocaleString(),
      zip_code:      zip,
      pref:          pref,
      city:          city,
      address:       addr,
      phone:         phone || '未入力',
      message:       msg || 'なし',
      order_id:      orderData.orderId,
      ordered_at:    orderData.orderedAt,
    });
    // 成功 → カートクリア → 完了ページへ
    Cart.clear();
    window.location.href = 'complete.html';
  } catch (err) {
    console.error('EmailJS error:', err);

    // EmailJS未設定でもデモ動作できるようフォールバック
    if (CONFIG.emailjs.serviceId === 'YOUR_SERVICE_ID') {
      // 開発モード: EmailJS未設定でも遷移できる
      Cart.clear();
      window.location.href = 'complete.html';
    } else {
      btn.disabled = false;
      btn.innerHTML = '注文を確定する →';
      alertArea.innerHTML = `<div class="alert-err">
        ❌ 送信に失敗しました。通信環境を確認してください。<br>
        <small>エラー詳細: ${JSON.stringify(err)}</small>
      </div>`;
      alertArea.scrollIntoView({ behavior: 'smooth' });
    }
  }
}
</script>
</body>
</html>
