<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳細 — Anazon</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
</head>
<body>

<div id="header-mount"></div>

<!-- ====================================================
     思い出モーダル: カートに追加しようとしたときに表示
     ==================================================== -->
<div class="modal-ov" id="memModal">
  <div class="modal-box">
    <div class="modal-hd">
      <h3>⚠️ ちょっと待って！！！</h3>
      <button class="mx" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bd">
      <div class="frame" id="modal-frame">
        <img id="modal-photo" src="" alt="思い出写真"
             onerror="document.getElementById('modal-frame').classList.add('noph')">
        <div class="ph"><span>📸</span><strong>思い出写真</strong><small>ここに写真が表示されます</small></div>
      </div>
      <h4 id="modal-title">本当に注文しますか？<br>その前にこの写真を見てください！</h4>
      <p id="modal-body">大切な思い出です。注文する前に、少しだけ立ち止まって振り返ってみてください。</p>
      <p class="modal-timer" id="modal-timer">※ボタンが3秒後に有効になります…</p>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeModal()">やっぱりやめる 😢</button>
      <button class="btn-dismiss" id="btn-dismiss" disabled onclick="doAddToCart()">
        わかった、それでも注文する →
      </button>
    </div>
  </div>
</div>

<div class="page-wrap">

  <!-- パンくずリスト -->
  <p style="font-size:13px; color:#999; margin-bottom:12px;">
    <a href="index.html" style="color:var(--link)">Anazon</a> ›
    <span id="bc-cat">カテゴリ</span> ›
    <span id="bc-name">商品名</span>
  </p>

  <!-- ====================================================
       商品詳細メインエリア
       ==================================================== -->
  <div class="det-wrap mb30">

    <!-- 画像 -->
    <div class="det-img-col">
      <div class="det-main-img">
        <img id="det-img" src="" alt="">
      </div>
    </div>

    <!-- 商品情報 -->
    <div class="det-info">
      <p class="det-category" id="det-cat"></p>
      <h1 class="det-title" id="det-title"></h1>
      <div class="det-stars">
        <span class="stars" id="det-stars"></span>
        <span id="det-rating"></span>
        <span class="rev-cnt" id="det-revcnt"></span>
      </div>
      <div class="det-price-box">
        <p class="det-price-label">価格：</p>
        <span class="det-price" id="det-price"></span>
        <span class="det-orig" id="det-orig"></span>
        <span class="det-disc" id="det-disc"></span>
      </div>
      <p class="det-stock" id="det-stock"></p>
      <p class="det-desc" id="det-desc"></p>
      <ul class="det-feats" id="det-feats"></ul>
    </div>

    <!-- 買い物ボックス -->
    <div class="buy-box">
      <p class="buy-box-price" id="bb-price"></p>
      <p class="buy-box-delivery">✅ 近日中にお届け（プライム会員）</p>
      <button class="btn-cart" id="btn-add-cart" onclick="openModal()">🛒 カートに追加</button>
      <button class="btn-buynow" id="btn-buy-now" onclick="openModal()">⚡ 今すぐ買う</button>
      <p class="buy-box-secure" style="margin-top:10px; font-size:12px; color:#565959;">
        🔒 安全な決済 &nbsp;|&nbsp; 返品不可
      </p>
      <hr style="margin: 12px 0; border-color:#EAEDED">
      <p style="font-size:12px; color:#565959;">出品者: <a href="#" style="color:var(--link)">Anazon直営店</a></p>
    </div>
  </div>

  <!-- ====================================================
       カスタマーレビュー
       ==================================================== -->
  <div class="reviews-section mb30">
    <div class="sec-hd">
      <h2 class="sec-title">⭐ カスタマーレビュー</h2>
    </div>
    <div id="reviews-mount"></div>
  </div>

</div><!-- /.page-wrap -->

<div id="footer-mount"></div>

<script>
document.getElementById('header-mount').innerHTML = buildHeader('product');
document.getElementById('footer-mount').innerHTML = buildFooter();

// ---- 商品読み込み ----
const params = new URLSearchParams(location.search);
const pid = parseInt(params.get('id'));
const product = PRODUCTS.find(p => p.id === pid);

if (!product) {
  document.querySelector('.page-wrap').innerHTML = `
    <div style="text-align:center;padding:60px;background:#fff;border-radius:4px">
      <p style="font-size:60px">😕</p>
      <h2>商品が見つかりません</h2>
      <p style="margin:15px 0;color:#565959">指定された商品IDが存在しません。</p>
      <a href="index.html" style="color:var(--link)">トップページへ戻る</a>
    </div>`;
} else {
  const soldOut = product.soldOut || product.stock === 0;
  const disc = product.origPrice ? Math.round((1 - product.price / product.origPrice) * 100) : 0;

  document.title = product.name + ' — Anazon';
  document.getElementById('bc-cat').textContent = product.category;
  document.getElementById('bc-name').textContent = product.name.slice(0, 30) + '…';
  document.getElementById('det-img').src = product.img;
  document.getElementById('det-img').alt = product.name;
  document.getElementById('det-cat').textContent = product.category;
  document.getElementById('det-title').textContent = product.name;
  document.getElementById('det-stars').textContent = renderStars(product.rating);
  document.getElementById('det-rating').textContent = product.rating;
  document.getElementById('det-revcnt').textContent = `(${product.revCnt.toLocaleString()} 件のレビュー)`;
  document.getElementById('det-price').textContent = soldOut ? '在庫切れ' : '¥' + product.price.toLocaleString();
  if (product.origPrice) {
    document.getElementById('det-orig').textContent = '¥' + product.origPrice.toLocaleString();
    document.getElementById('det-disc').textContent = `-${disc}%`;
  }
  document.getElementById('det-stock').innerHTML = soldOut
    ? '<span class="no-stock">✕ 現在在庫切れです</span>'
    : `<span class="in-stock">✓ 在庫あり（残り${product.stock}点）</span>`;
  document.getElementById('det-desc').textContent = product.desc;
  document.getElementById('det-feats').innerHTML = product.features.map(f => `<li>${f}</li>`).join('');
  document.getElementById('bb-price').textContent = soldOut ? '在庫切れ' : '¥' + product.price.toLocaleString();

  if (soldOut) {
    document.getElementById('btn-add-cart').disabled = true;
    document.getElementById('btn-buy-now').disabled = true;
  }

  // レビュー
  const revMount = document.getElementById('reviews-mount');
  if (product.reviews && product.reviews.length) {
    revMount.innerHTML = product.reviews.map(r => `
      <div class="review-card">
        <div class="review-name">${r.name}</div>
        <div class="p-card-stars" style="margin-bottom:6px">
          <span class="stars">${renderStars(r.stars)}</span>
        </div>
        <p class="review-body">${r.body}</p>
      </div>`).join('');
  } else {
    revMount.innerHTML = '<p style="color:#565959;padding:15px 0">まだレビューはありません。</p>';
  }
}

// ---- モーダル制御 ----
let pendingCartProduct = null;
let timerInterval = null;

function openModal() {
  if (!product || product.soldOut || product.stock === 0) return;

  const frame = document.getElementById('modal-frame');
  const img = document.getElementById('modal-photo');
  frame.classList.remove('noph');
  img.src = 'images/memories/photo11.JPG';
  img.onerror = () => frame.classList.add('noph');

  document.getElementById('modal-title').innerHTML = 'ちょっと待って！！！<br>この写真を見てから決めてください！';
  document.getElementById('modal-body').textContent = 'この大切な思い出と引き換えに、本当に注文してしまいますか？（するべきです）';

  // ボタンを3秒間無効化
  const btn = document.getElementById('btn-dismiss');
  const timerEl = document.getElementById('modal-timer');
  btn.disabled = true;
  let sec = 3;
  timerEl.textContent = `※ ボタンが ${sec} 秒後に有効になります…`;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(timerInterval);
      btn.disabled = false;
      timerEl.textContent = '→ 注文を続けることができます';
    } else {
      timerEl.textContent = `※ ボタンが ${sec} 秒後に有効になります…`;
    }
  }, 1000);

  document.getElementById('memModal').classList.add('on');
}

function closeModal() {
  clearInterval(timerInterval);
  document.getElementById('memModal').classList.remove('on');
}

function doAddToCart() {
  if (!product) return;
  Cart.set(product);
  closeModal();
  window.location.href = 'cart.html';
}

</script>
</body>
</html>
